<!DOCTYPE html>
<html lang="en">

<head>
    <title>DataDuck — Browser-based SQL data lab</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Drop a CSV into your browser, run SQL on it instantly with DuckDB-WASM. Optionally translate English to SQL with Groq AI. Nothing uploads — your data stays local.">
    <meta name="theme-color" content="#F3F4F6">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="DataDuck — Browser-based SQL data lab">
    <meta property="og:description" content="Drop a CSV, run SQL on it instantly with DuckDB-WASM. English-to-SQL via Groq. All client-side.">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="DataDuck">
    <meta name="twitter:description" content="Browser-based SQL data lab — DuckDB-WASM + Groq AI.">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http%3A//www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%A6%86%3C/text%3E%3C/svg%3E">
    <link rel="alternate icon" href="./favicon.ico">
    <link rel="stylesheet" href="./app.css" />

    <style>
        body {
            margin: 0;
            background: #F3F4F6;
            color: #111827;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        .dataduck-splash {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .dataduck-splash .logo {
            font-size: 64px;
        }
        .dataduck-splash .name {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .dataduck-splash .tag {
            font-size: 14px;
            color: #6B7280;
        }
        .dataduck-splash .progress {
            margin-top: 24px;
            width: 240px;
            height: 3px;
            border-radius: 2px;
            background: #E5E7EB;
            overflow: hidden;
            position: relative;
        }
        .dataduck-splash .progress::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, #F4C430, transparent);
            animation: slide 1.4s ease-in-out infinite;
        }
        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>

<body>
<div id="out">
    <div class="dataduck-splash">
        <div class="logo">🦆</div>
        <div class="name">DataDuck</div>
        <div class="tag">Booting WebAssembly runtime…</div>
        <div class="progress"></div>
    </div>
</div>
<script>
    // Avalonia mounts its canvas as a sibling of the splash inside #out.
    // The splash is position:absolute and would otherwise sit on top forever.
    // Drop it the moment a non-splash child appears.
    (() => {
        const out = document.getElementById('out');
        const splash = out && out.querySelector('.dataduck-splash');
        if (!out || !splash) return;
        const obs = new MutationObserver(() => {
            const other = Array.from(out.children).some(c => c !== splash);
            if (other) {
                splash.remove();
                obs.disconnect();
            }
        });
        obs.observe(out, { childList: true });
    })();
</script>
<script type='module' src="./main.js"></script>
</body>

</html>
